spring:
  application:
    name: myjara-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/myjara
    username: myjara
    password: myjara
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

myjara:
  jwt:
    secret: clave-secreta-cambiar-en-produccion-minimo-256-bits
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.myjara: DEBUG
    org.springframework.security: INFO