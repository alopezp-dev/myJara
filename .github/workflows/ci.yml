name: MyJara CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: myjara_test
          POSTGRES_USER: myjara
          POSTGRES_PASSWORD: myjara
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y ejecutar tests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5433/myjara_test
          SPRING_DATASOURCE_USERNAME: myjara
          SPRING_DATASOURCE_PASSWORD: myjara
          MYJARA_JWT_SECRET: clave-secreta-para-tests-minimo-256-bits-xxxxxxxxxxx
        run: mvn clean verify -B

      - name: Generar JAR
        working-directory: backend
        run: mvn package -DskipTests -B

      - name: Subir JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: myjara-backend-jar
          path: backend/target/*.jar
          retention-days: 7

  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build de producción
        working-directory: frontend
        run: npm run build

      - name: Subir build como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: myjara-frontend-build
          path: frontend/dist/
          retention-days: 7